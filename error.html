<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo-sos-Blanc-or-sans-arriere-plan.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SOS Company SARL - Page Not Found. Error 404." />
    <title>404 - Page Not Found | SOS Company SARL</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      :root {
        --color-black: #000000;
        --color-gold: #C9A646;
        --color-gold-light: #D4B564;
        --color-gold-dark: #9F7F33;
        --color-white: #FFFFFF;
        --color-gray-light: #F5F5F5;
        --color-gray-dark: #1A1A1A;
        --font-primary: 'Poppins', sans-serif;
        --spacing-xs: 8px;
        --spacing-sm: 16px;
        --spacing-md: 24px;
        --spacing-lg: 48px;
        --spacing-xl: 80px;
        --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--font-primary);
        font-size: 16px;
        line-height: 1.6;
        color: var(--color-white);
        background: var(--color-black);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background-image: url('/ae178298-abe2-4090-9828-f5ef1f63bcda.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }

      .error-container {
        max-width: 900px;
        margin: 0 auto;
        padding: var(--spacing-lg);
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .error-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.75);
        pointer-events: none;
        z-index: 0;
      }

      .logo-wrapper {
        margin-bottom: var(--spacing-xl);
        animation: fadeInDown 0.8s ease-out;
      }

      .logo {
        width: 140px;
        height: auto;
        filter: drop-shadow(0 4px 20px rgba(201, 166, 70, 0.4));
        transition: var(--transition-smooth);
      }

      .logo:hover {
        filter: drop-shadow(0 8px 40px rgba(201, 166, 70, 0.6));
        transform: scale(1.08);
      }

      .error-code {
        font-size: clamp(4rem, 12vw, 10rem);
        font-weight: 700;
        background: linear-gradient(135deg, var(--color-gold) 0%, var(--color-gold-light) 50%, var(--color-gold-dark) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 30px rgba(201, 166, 70, 0.3);
        margin: var(--spacing-lg) 0;
        animation: fadeInUp 0.8s ease-out 0.1s both;
        letter-spacing: 0.1em;
      }

      .error-icon {
        display: inline-block;
        width: 100px;
        height: 100px;
        margin: 0 auto; /* 🔥 centre horizontalement */
        background: linear-gradient(135deg, var(--color-gold) 0%, var(--color-gold-dark) 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: var(--spacing-md);
        animation: float 3s ease-in-out infinite, fadeInDown 0.8s ease-out 0.2s both;
        box-shadow: 0 0 40px rgba(201, 166, 70, 0.3);
      }

      .error-icon i {
        font-size: 3rem;
        color: var(--color-black);
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .error-title {
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        font-weight: 700;
        color: var(--color-white);
        margin-bottom: var(--spacing-md);
        animation: fadeInUp 0.8s ease-out 0.2s both;
      }

      .error-message {
        font-size: clamp(1rem, 2vw, 1.2rem);
        font-weight: 300;
        color: var(--color-gray-light);
        margin-bottom: var(--spacing-xl);
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.8;
        animation: fadeInUp 0.8s ease-out 0.3s both;
      }

      .error-actions {
        display: flex;
        gap: var(--spacing-md);
        justify-content: center;
        flex-wrap: wrap;
        animation: fadeInUp 0.8s ease-out 0.4s both;
      }

      .home-button {
        display: inline-block;
        padding: 16px 48px;
        background: linear-gradient(135deg, var(--color-gold) 0%, var(--color-gold-dark) 100%);
        color: var(--color-black);
        font-size: 1.1rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 50px;
        transition: var(--transition-smooth);
        box-shadow: 0 4px 20px rgba(201, 166, 70, 0.3);
        position: relative;
        overflow: hidden;
        z-index: 1;
        border: none;
        cursor: pointer;
        font-family: var(--font-primary);
      }

      .home-button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, var(--color-gold-light) 0%, var(--color-gold) 100%);
        transition: var(--transition-smooth);
        z-index: -1;
      }

      .home-button:hover::before {
        left: 0;
      }

      .home-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(201, 166, 70, 0.5);
      }

      .secondary-link {
        display: inline-block;
        padding: 16px 36px;
        color: var(--color-gold);
        font-size: 1rem;
        font-weight: 500;
        text-decoration: none;
        border: 2px solid var(--color-gold);
        border-radius: 50px;
        transition: var(--transition-smooth);
        background: transparent;
      }

      .secondary-link:hover {
        background: var(--color-gold);
        color: var(--color-black);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(201, 166, 70, 0.3);
      }

      .glowing-line {
        position: absolute;
        width: 200px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
        top: 50%;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0.5;
        animation: glow 3s ease-in-out infinite;
      }

      @keyframes glow {
        0%, 100% {
          opacity: 0.3;
          box-shadow: 0 0 10px rgba(201, 166, 70, 0.3);
        }
        50% {
          opacity: 0.8;
          box-shadow: 0 0 30px rgba(201, 166, 70, 0.6);
        }
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        .error-code {
          margin: var(--spacing-md) 0;
        }

        .home-button,
        .secondary-link {
          padding: 14px 32px;
          font-size: 1rem;
        }

        .error-actions {
          gap: var(--spacing-sm);
        }

        .error-container {
          padding: var(--spacing-md);
        }
      }

      @media (max-width: 480px) {
        .logo {
          width: 110px;
        }

        .error-icon {
          width: 80px;
          height: 80px;
        }

        .error-icon i {
          font-size: 2rem;
        }

        .error-title {
          font-size: 1.5rem;
        }

        .error-message {
          font-size: 0.95rem;
        }

        .home-button,
        .secondary-link {
          width: 100%;
          padding: 14px 24px;
        }

        .error-actions {
          flex-direction: column;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-background"></div>
    <div class="glowing-line"></div>

    <div class="error-container">
      <div class="logo-wrapper">
        <img src="/Logo-sos-Blanc-or-sans-arriere-plan.png" alt="SOS Company SARL" class="logo" />
      </div>

      <div class="error-icon">
        <i class="fas fa-exclamation-triangle"></i>
      </div>

      <h1 class="error-code">404</h1>

      <h2 class="error-title">Page Not Found</h2>

      <p class="error-message">
        The page you are looking for does not exist or has been moved. Let's get you back on track.
      </p>

      <div class="error-actions">
        <a href="/index.html" class="home-button">Back to Home</a>
        <a href="/#contact" class="secondary-link">Contact Us</a>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const homeButton = document.querySelector('.home-button');
        if (homeButton) {
          homeButton.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/';
          });
        }
      });
    </script>
  </body>
</html>
